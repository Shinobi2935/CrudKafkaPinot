<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orden - CrudKafkaPinot</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; text-decoration: none; }
        .btn-success   { background: #28a745; }
        .btn-secondary { background: #6c757d; }
    </style>
</head>
<body>
<h1 th:text="${orden.id == null ? 'Nueva Orden' : 'Editar Orden'}"></h1>
<form th:action="@{/ordenes/guardar}" th:object="${orden}" method="post">
    <input type="hidden" th:field="*{id}" />
    <div class="form-group">
        <label>Cliente ID</label>
        <input type="number" th:field="*{clienteId}" placeholder="Ej: 1" required />
    </div>
    <div class="form-group">
        <label>Total ($)</label>
        <input type="number" step="0.01" th:field="*{total}" placeholder="Ej: 150.00" required />
    </div>
    <div class="form-group">
        <label>Estado</label>
        <select th:field="*{estado}">
            <option value="PENDIENTE">PENDIENTE</option>
            <option value="EN_PROCESO">EN PROCESO</option>
            <option value="ENVIADO">ENVIADO</option>
            <option value="ENTREGADO">ENTREGADO</option>
            <option value="CANCELADO">CANCELADO</option>
        </select>
    </div>
    <div class="form-group">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/ordenes}">Cancelar</a>
    </div>
</form>
</body>
</html>
